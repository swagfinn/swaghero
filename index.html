<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#06101e"/>
<meta name="description" content="神隊友感謝牆 — 把感謝說出來，讓每一份支持被看見。"/>
<meta property="og:title" content="神隊友感謝牆"/>
<meta property="og:description" content="還好有你｜感謝被看見，合作更有力量"/>
<meta property="og:type" content="website"/>
<meta property="og:image" content="https://duk.tw/6LH1sf.jpg"/>
<meta name="twitter:card" content="summary_large_image"/>
<title>神隊友感謝牆</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦸</text></svg>"/>
<style>
/* ══════════════════════════════════════════
   色彩系統
   主色   --brand  : #00D2BE  青綠
   輔色1  --accent : #d30c7b  深粉紅
   輔色2  --yellow : #fde74c  亮黃
   輔色3  --cream  : #fbf5f3  米白
   背景           : #06101e
   ══════════════════════════════════════════ */
:root{
  --bg-deep:#06101e;
  --bg-mid:#0a1628;
  --line:rgba(0,210,190,.1);
  --text:#f0faf9;
  --muted:#7ab8b2;
  --muted2:#5a9490;
  --brand:#00D2BE;
  --brand2:#00ecd6;
  --accent:#d30c7b;
  --accent2:#f03a96;
  --yellow:#fde74c;
  --yellow2:#fff2a0;
  --cream:#fbf5f3;
  --shadow:0 24px 48px rgba(0,0,0,.42);
  --r-xl:22px;
  --r-lg:16px;
  --r-md:12px;
  --logo:url("https://duk.tw/6LH1sf.jpg");
  --maxw:1300px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;overflow-x:hidden;}
body{
  font-family:"Segoe UI","PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
  color:var(--text);
  background:
    radial-gradient(ellipse 55% 38% at 8% 4%,rgba(0,210,190,.1) 0%,transparent 58%),
    radial-gradient(ellipse 45% 32% at 92% 10%,rgba(211,12,123,.09) 0%,transparent 52%),
    radial-gradient(ellipse 38% 28% at 55% 92%,rgba(253,231,76,.05) 0%,transparent 50%),
    linear-gradient(160deg,#06101e 0%,#0a1628 50%,#081420 100%);
  position:relative;
}

/* ─── Logo Rain ─── */
.logo-rain{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.logo-drop{
  position:absolute;top:-200px;
  background-image:var(--logo);
  background-size:contain;background-repeat:no-repeat;background-position:center;
  opacity:var(--op,.18);
  filter:blur(.2px) drop-shadow(0 0 12px rgba(0,210,190,.25));
  animation:falling var(--dur,20s) linear var(--del,0s) infinite;
  width:var(--sz,90px);height:calc(var(--sz,90px)*.44);
  will-change:transform;
}
@keyframes falling{
  from{transform:translateY(-200px) translateX(0) rotate(var(--rot,-6deg));}
  to{transform:translateY(115vh) translateX(var(--dx,50px)) rotate(calc(var(--rot,-6deg)+10deg));}
}

/* ─── Layout ─── */
.page{
  position:relative;z-index:1;
  width:min(var(--maxw),calc(100% - 32px));
  margin:0 auto;padding:28px 0 48px;
}

/* ─── Hero ─── */
.hero{text-align:center;padding:8px 0 26px;}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 16px;border-radius:999px;margin-bottom:14px;
  border:1px solid rgba(0,210,190,.28);background:rgba(0,210,190,.09);
  color:#a0ece6;font-size:13px;letter-spacing:.02em;
}
.hero h1{font-size:clamp(28px,4.5vw,52px);font-weight:900;line-height:1.08;letter-spacing:.01em;}
.gtext{
  background:linear-gradient(90deg,#ffbf3f 0%,#ffe08a 50%,#ffbf3f 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero p{margin:10px auto 0;max-width:680px;color:var(--muted);font-size:15px;line-height:1.8;}

/* ─── Panel ─── */
.panel{
  background:linear-gradient(180deg,rgba(6,16,30,.38),rgba(4,12,24,.32));
  border:1px solid rgba(0,210,190,.13);
  border-radius:var(--r-xl);
  box-shadow:0 8px 32px rgba(0,0,0,.22);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  position:relative;overflow:hidden;
}
.panel::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(0,210,190,.04) 0%,transparent 35%,transparent 68%,rgba(211,12,123,.03) 100%);
}

/* ─── Stats ─── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:18px;}
.stat-card{
  padding:20px 18px;border-radius:var(--r-lg);
  border:1px solid rgba(0,210,190,.1);background:rgba(0,210,190,.02);
  position:relative;overflow:hidden;min-height:112px;
}
.stat-card::after{
  content:"";position:absolute;right:-20px;top:-20px;
  width:88px;height:88px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,210,190,.08),transparent 70%);
}
.stat-icon-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.sicon{
  width:36px;height:36px;border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.07),0 6px 16px rgba(0,0,0,.28);
}
.sicon.pink{background:rgba(211,12,123,.18);color:#f03a96;}
.sicon.teal{background:rgba(0,210,190,.18);color:var(--brand2);}
.sicon.gold{background:rgba(253,231,76,.18);color:var(--yellow);}
.stat-val{font-size:clamp(24px,3vw,36px);font-weight:900;line-height:1;letter-spacing:.02em;}
.stat-lbl{margin-top:6px;color:var(--muted);font-size:12.5px;}

/* ─── Marquee ─── */
.marquee-wrap{padding:0 18px 18px;}
.marquee-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.marquee-ttl{display:flex;align-items:center;gap:9px;font-weight:700;font-size:13.5px;color:var(--cream);}
.live-dot{
  width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;
  animation:pulse 1.8s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(211,12,123,.6);}
  70%{box-shadow:0 0 0 9px rgba(211,12,123,0);}
  100%{box-shadow:0 0 0 0 rgba(211,12,123,0);}
}
.marquee-bar{
  border:1px solid rgba(0,210,190,.1);border-radius:var(--r-lg);
  background:rgba(0,210,190,.015);overflow:hidden;min-height:52px;position:relative;
}
.marquee-bar::before,.marquee-bar::after{
  content:"";position:absolute;top:0;bottom:0;width:44px;z-index:2;pointer-events:none;
}
.marquee-bar::before{left:0;background:linear-gradient(90deg,rgba(7,24,30,.55),transparent);}
.marquee-bar::after{right:0;background:linear-gradient(-90deg,rgba(7,24,30,.55),transparent);}
.marquee-track{
  display:flex;width:max-content;padding:14px 0;
  white-space:nowrap;animation:mq 48s linear infinite;will-change:transform;
}
.marquee-track:hover{animation-play-state:paused;}
@keyframes mq{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.mq-item{display:inline-flex;align-items:center;gap:6px;padding:0 20px;color:#b8e8e4;font-size:13.5px;}
.mq-sep{color:rgba(0,210,190,.25);margin:0 2px;}
.mq-heart{color:var(--accent);}

/* ─── Toolbar ─── */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:20px;}
.chips{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
.chip{
  padding:8px 14px;border-radius:999px;cursor:pointer;user-select:none;
  border:1px solid rgba(0,210,190,.15);background:rgba(0,210,190,.04);
  color:#8dd6d0;font-size:13px;white-space:nowrap;transition:all .2s ease;
}
.chip:hover,.chip.active{
  color:#fff;border-color:rgba(211,12,123,.55);
  background:linear-gradient(90deg,rgba(211,12,123,.22),rgba(240,58,150,.14));
  box-shadow:0 6px 18px rgba(211,12,123,.18);
}
.search-box{width:min(300px,100%);}
.search-box input{
  width:100%;height:42px;padding:0 14px;
  border:1px solid rgba(0,210,190,.15);border-radius:999px;
  background:rgba(0,210,190,.04);color:var(--text);outline:none;font-size:14px;
  transition:.2s ease;
}
.search-box input::placeholder{color:#5a8e8a;}
.search-box input:focus{border-color:rgba(0,210,190,.55);box-shadow:0 0 0 3px rgba(0,210,190,.12);}

/* ─── Leaderboard ─── */
.leader-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:20px;}
.leader-card{padding:20px;display:flex;flex-direction:column;gap:10px;}
.leader-lbl{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);margin-bottom:2px;
}
.leader-lbl .ldot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.8;}
.leader-lbl.lbl-pink{color:var(--accent2);}
.leader-lbl.lbl-teal{color:var(--brand);}
.leader-main{display:flex;align-items:center;gap:12px;}
.avatar{
  width:50px;height:50px;border-radius:14px;flex-shrink:0;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;color:#fff;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.1),0 8px 18px rgba(0,0,0,.25);
}
.av-gold  {background:linear-gradient(135deg,#007a6e,#00D2BE);}
.av-teal  {background:linear-gradient(135deg,#005e8a,#00b4d8);}
.av-pink  {background:linear-gradient(135deg,#8c0050,#d30c7b);}
.av-green {background:linear-gradient(135deg,#006644,#00c87a);}
.av-purple{background:linear-gradient(135deg,#4a1090,#9050e0);}
.av-orange{background:linear-gradient(135deg,#7a2e00,#e07020);}
.av-gray  {background:linear-gradient(135deg,#1e3a3a,#3a6060);}
.leader-info h3{font-size:18px;font-weight:800;line-height:1.2;}
.leader-info p{color:var(--muted);font-size:12.5px;margin-top:3px;}
.leader-score{
  margin-left:auto;align-self:flex-start;
  background:rgba(253,231,76,.12);color:var(--yellow2);
  border:1px solid rgba(253,231,76,.22);
  padding:6px 10px;border-radius:10px;font-size:12px;font-weight:800;
  min-width:44px;text-align:center;white-space:nowrap;
}
.add-card{
  padding:20px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;text-align:center;min-height:110px;
  border:1px dashed rgba(0,210,190,.3);background:rgba(0,210,190,.04);
  transition:.25s ease;
}
.add-card:hover{
  border-color:rgba(0,210,190,.6);background:rgba(0,210,190,.09);
  transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,210,190,.16);
}
.add-icon{
  width:48px;height:48px;border-radius:14px;font-size:22px;
  background:linear-gradient(135deg,rgba(0,210,190,.22),rgba(0,236,214,.14));
  border:1px solid rgba(0,210,190,.25);
  display:flex;align-items:center;justify-content:center;
}
.add-card p{color:#ffbf3f;font-weight:700;font-size:15px;}
.add-card span{color:var(--muted);font-size:12px;}

/* ─── Wall ─── */
.wall{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:20px;}
.post-card{padding:20px;display:flex;flex-direction:column;}
.post-top{display:flex;align-items:flex-start;gap:11px;}
.post-info{flex:1;min-width:0;}
.post-name-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.post-name{font-size:18px;font-weight:800;line-height:1.2;word-break:break-word;}
.post-dept{font-size:12px;color:var(--muted);margin-top:3px;}
.post-time{color:var(--muted2);font-size:12px;white-space:nowrap;}
.post-body{
  margin-top:14px;color:#cdeae8;line-height:1.85;
  font-size:14px;min-height:72px;white-space:pre-wrap;word-break:break-word;flex:1;
}
.post-foot{
  margin-top:14px;padding-top:12px;
  border-top:1px solid rgba(0,210,190,.08);
  display:flex;align-items:center;gap:10px;
}
.act-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,210,190,.04);border:1px solid rgba(0,210,190,.12);
  color:var(--muted);border-radius:999px;padding:6px 13px;
  font-size:13px;font-weight:600;cursor:pointer;transition:.2s ease;
}
.act-btn:hover{color:#fff;border-color:rgba(0,210,190,.35);background:rgba(0,210,190,.1);}
.act-btn.liked{color:#d30c7b;border-color:rgba(211,12,123,.4);background:rgba(211,12,123,.12);}
.act-btn:active{transform:scale(.96);}

/* ─── Comments ─── */
.comments-wrap{margin-top:12px;display:none;}
.comments-wrap.open{display:block;}
.comment-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.comment-item{
  background:rgba(0,210,190,.03);border:1px solid rgba(0,210,190,.09);
  border-radius:var(--r-md);padding:9px 12px;
  font-size:13px;color:#b0dcd8;line-height:1.6;word-break:break-word;
}
.comment-item .c-time{font-size:11px;color:var(--muted2);margin-top:4px;}
.comment-form{display:flex;gap:8px;}
.comment-input{
  flex:1;border:1px solid rgba(0,210,190,.14);border-radius:var(--r-md);
  background:rgba(0,210,190,.04);color:var(--text);
  padding:9px 12px;font-size:13px;outline:none;resize:none;min-height:40px;
  transition:.2s ease;
}
.comment-input::placeholder{color:#5a8e8a;}
.comment-input:focus{border-color:rgba(0,210,190,.5);box-shadow:0 0 0 3px rgba(0,210,190,.1);}
.comment-send{
  padding:0 14px;border:none;border-radius:var(--r-md);cursor:pointer;
  background:linear-gradient(90deg,var(--brand),var(--brand2));
  color:#071a1a;font-weight:700;font-size:13px;white-space:nowrap;
  transition:.15s ease;flex-shrink:0;height:40px;
}
.comment-send:hover{opacity:.85;}
.comment-limit{font-size:12px;color:var(--yellow);text-align:center;padding:8px;font-weight:600;}
.empty{
  grid-column:1/-1;text-align:center;padding:36px 20px;
  color:var(--muted);border:1px dashed rgba(0,210,190,.12);
  border-radius:var(--r-xl);background:rgba(0,210,190,.02);
}

/* ─── Modal ─── */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(5,12,22,.82);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:100;display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;transition:.25s ease;
}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{
  background:linear-gradient(180deg,rgba(8,18,36,.98),rgba(5,13,26,.98));
  border:1px solid rgba(0,210,190,.25);border-radius:var(--r-xl);
  box-shadow:0 32px 64px rgba(0,0,0,.55),0 0 0 1px rgba(0,210,190,.06);
  width:min(520px,100%);max-height:90vh;overflow-y:auto;
  padding:28px;position:relative;
  transform:scale(.95) translateY(10px);transition:.25s ease;
}
.modal-backdrop.open .modal{transform:scale(1) translateY(0);}
.modal-close{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;border-radius:50%;cursor:pointer;
  border:1px solid rgba(0,210,190,.15);background:rgba(0,210,190,.06);
  color:var(--muted);font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:.2s ease;
}
.modal-close:hover{background:rgba(211,12,123,.2);border-color:rgba(211,12,123,.35);color:#fff;}
.modal h2{font-size:20px;font-weight:800;margin-bottom:6px;letter-spacing:.01em;}
.modal .hint-top{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:18px;}

/* ─── Form fields ─── */
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
label{font-size:13px;color:#a8d8d4;font-weight:700;letter-spacing:.03em;}
input[type=text],select,textarea{
  width:100%;border:1px solid rgba(0,210,190,.14);
  background:rgba(0,210,190,.04);color:var(--text);
  border-radius:var(--r-md);padding:12px 14px;outline:none;font-size:14.5px;
  transition:.2s ease;
}
input[type=text]::placeholder,textarea::placeholder{color:#5a8e8a;}
input[type=text]:focus,select:focus,textarea:focus{
  border-color:rgba(0,210,190,.6);
  box-shadow:0 0 0 3px rgba(0,210,190,.12);
  background:rgba(0,210,190,.07);
}
select option{background:#06101e;color:var(--text);}
textarea{min-height:120px;resize:vertical;line-height:1.7;}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-foot{display:flex;justify-content:flex-end;margin-top:18px;}
.btn-primary{
  padding:11px 22px;border:none;border-radius:var(--r-md);cursor:pointer;
  background:linear-gradient(90deg,var(--brand),var(--brand2));
  color:#071a1a;font-weight:800;font-size:14px;
  box-shadow:0 8px 20px rgba(0,210,190,.28);transition:.15s ease;
}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);}

/* ─── Toast ─── */
.toast{
  position:fixed;left:50%;bottom:24px;
  transform:translateX(-50%) translateY(12px);
  background:rgba(6,16,30,.96);color:var(--cream);
  border:1px solid rgba(0,210,190,.25);
  padding:12px 20px;border-radius:var(--r-lg);
  box-shadow:var(--shadow);font-size:14px;
  opacity:0;pointer-events:none;transition:.22s ease;
  z-index:200;min-width:220px;text-align:center;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── Footer ─── */
.footer{text-align:center;color:var(--muted2);font-size:12px;margin-top:28px;line-height:1.9;}

/* ─── Responsive ─── */
@media(max-width:1100px){
  .wall{grid-template-columns:repeat(2,1fr);}
  .leader-row{grid-template-columns:1fr 1fr;gap:12px;}
  .leader-row .add-leader-card{grid-column:1/-1;}
}
@media(max-width:760px){
  .stats-row{grid-template-columns:1fr;gap:10px;}
  .toolbar{align-items:stretch;}
  .search-box{width:100%;}
  .wall{grid-template-columns:1fr;}
  .leader-row{grid-template-columns:1fr;}
  .leader-row .add-leader-card{grid-column:auto;}
  .form-2col{grid-template-columns:1fr;}
  .post-name-row{flex-direction:column;align-items:flex-start;}
  .marquee-track{animation-duration:90s;}
}
@media(max-width:540px){
  .page{padding:16px 0 32px;}
  .panel,.stat-card{border-radius:16px;}
  .hero h1{font-size:26px;}
  .modal{padding:20px;}
  .stats-row{padding:12px;}
}
@media(prefers-reduced-motion:reduce){
  .logo-drop,.marquee-track,.live-dot{animation:none!important;}
  *{scroll-behavior:auto!important;}
}
</style>
</head>
<body>

<noscript>
  <style>
    body{display:flex;align-items:center;justify-content:center;
    min-height:100vh;text-align:center;padding:20px;
    background:#06101e;color:#7ab8b2;font-family:sans-serif;}
  </style>
  <p>神隊友感謝牆需要 JavaScript 才能運作，請開啟瀏覽器的 JavaScript 後重新整理。</p>
</noscript>

<div class="logo-rain" id="logoRain" aria-hidden="true"></div>

<main class="page" role="main">

  <!-- Hero -->
  <section class="hero">
    <div class="hero-badge">還好有你｜感謝被看見，合作更有力量 🦸</div>
    <h1><span class="gtext">神隊友感謝牆</span></h1>
    <p>寫下感謝的那位同事，也許是他在你快爆炸時接住了事情，也許是他默默把最難的部分做好。每一份支持，成就了現在的我們。<br>別讓那句「謝謝」過期，讓我們大聲告訴對方：「還好有你」。</p>
  </section>

  <!-- 1.1 Stats + 1.2 Marquee -->
  <div class="panel" style="margin-top:0;" aria-label="統計數據">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon-row">
          <div class="sicon pink" aria-hidden="true">❤</div>
          <div class="stat-val" id="statLikes">—</div>
        </div>
        <div class="stat-lbl">總感謝按讚數</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-row">
          <div class="sicon teal" aria-hidden="true">↗</div>
          <div class="stat-val" id="statWeekNew">—</div>

<script>
(function(){
'use strict';

/* ── 設定 ── */
const GAS_URL      = 'https://script.google.com/a/macros/swag.live/s/AKfycbzARPUf_AdUcIKvLssrowFA63Y0-FxeBDhbE7LIsMSAY2lOZg1RHIgpf9cBKlNxxOEp/exec';
const LS_POSTS     = 'swag_wall_posts_v2';
const LS_LIKES     = 'swag_wall_likes_v2';
const LS_COMMENTS  = 'swag_wall_comments_v2';
const MAX_CMT      = 100;
const HOUR72       = 72 * 3600 * 1000;
const WEEK         = 7  * 24 * 3600 * 1000;

const DEPTS = [
  '全部',
  'Research & Development (RD)',
  'Marketing (市場)',
  'Executive Office (行政單位)',
  'Creator (TM)',
  'Customer Service (VIP)',
  'Product (PM)',
  'Design (設計)',
  'User Operation (OPS)',
  'Executive Office (行政單位,含HR)',
  'Finance (財務)'
];
const AV = ['av-gold','av-teal','av-pink','av-green','av-purple','av-orange'];

/* ── State ── */
const S = {
  posts:[], likesMap:{}, comments:{},
  dept:'全部', kw:'', openCmt:{}
};

/* ── DOM ── */
const $ = id => document.getElementById(id);
const D = {
  wall:$('wall'), mq:$('marqueeTrack'), chips:$('deptChips'),
  search:$('searchInput'), statL:$('statLikes'), statW:$('statWeekNew'),
  statC:$('statWeekComments'), leaders:$('leaderRow'),
  backdrop:$('modalBackdrop'), closeBtn:$('modalClose'),
  form:$('thanksForm'), heroName:$('heroName'),
  dept:$('dept'), story:$('story'),
  toast:$('toast'), rain:$('logoRain')
};

/* ── Storage ── */
function lsGet(k,fb){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):fb; }catch(e){ return fb; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

/* ── Init ── */
function init(){
  // 清除本機暫存，統一以 Google Sheets 為唯一資料來源
  lsSet(LS_POSTS, []);
  lsSet(LS_LIKES, {});
  lsSet(LS_COMMENTS, {});
  S.posts    = [];
  S.likesMap = {};
  S.comments = {};
  makeRain();
  bind();
  renderAll();
  pull();
}

/* ── Events ── */
function bind(){
  D.form.addEventListener('submit', onSubmit);
  D.closeBtn.addEventListener('click', closeMod);
  D.backdrop.addEventListener('click', e=>{ if(e.target===D.backdrop) closeMod(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeMod(); });
  D.search.addEventListener('input', debounce(e=>{
    S.kw=(e.target.value||'').trim().toLowerCase(); renderAll();
  },160));
  window.addEventListener('resize', debounce(makeRain, 220));

  // 手機從背景切回前景時：重新拉資料 + 補送未完成的寫入
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'visible'){
      pull();
      flushQueue();
    }
  });
}
function openMod(){ D.backdrop.classList.add('open'); setTimeout(()=>D.heroName.focus(),120); }
function closeMod(){ D.backdrop.classList.remove('open'); }

/* ── JSONP（手機相容版：body 插入 + timeout 保護） ── */
function jsonp(url, cb, timeoutMs){
  const ms   = timeoutMs || 12000;   // 手機網路預設 12 秒 timeout
  const name = '_jcb'+Date.now()+Math.random().toString(36).slice(2,6);
  const s    = document.createElement('script');
  let   done = false;

  const cleanup = function(){
    done = true;
    delete window[name];
    if(s.parentNode) s.parentNode.removeChild(s);
  };
  const finish = function(err, res){
    if(done) return;
    cleanup();
    cb(err, res);
  };

  // timeout：手機網路慢時避免永久卡住
  const timer = setTimeout(function(){
    finish(new Error('timeout'), null);
  }, ms);

  window[name] = function(r){
    clearTimeout(timer);
    finish(null, r);
  };
  s.onerror = function(){
    clearTimeout(timer);
    finish(new Error('script error'), null);
  };

  // 用 body 插入，iOS Safari 相容性比 head 好
  s.src = url + (url.includes('?')?'&':'?') + 'callback='+name+'&_t='+Date.now();
  (document.body || document.head).appendChild(s);
}

/* ── Pull (Google Sheets → UI)，含重試機制 ── */
function pull(retryCount){
  if(!GAS_URL.startsWith('https://script.google.com')){ useDemo(); return; }
  const retry = retryCount || 0;

  jsonp(GAS_URL+'?action=list', function(err, res){
    if(err){
      console.warn('[pull] 第'+(retry+1)+'次失敗:', err.message);
      if(retry < 2){
        setTimeout(function(){ pull(retry+1); }, (retry+1)*3000);
      } else {
        S._loaded = true;
        useDemo();
        toast('網路連線不穩，無法載入資料');
      }
      return;
    }
    const rows = res&&Array.isArray(res.data)?res.data:[];
    const norm = rows.map(normalizeRow).filter(Boolean);
    S._loaded = true;  // 標記已從伺服器取得回應
    if(norm.length){
      merge(norm);
      // 同步伺服器留言到本機
      norm.forEach(function(p){
        if(p.comments&&p.comments.length){
          const local = S.comments[p.id]||[];
          // 以伺服器為主，補上本機新增但尚未同步的留言
          const svCmts = p.comments.map(function(t){ return {text:t,createdAt:0}; });
          const localOnly = local.filter(function(lc){
            return !p.comments.includes(lc.text);
          });
          S.comments[p.id] = svCmts.concat(localOnly);
        }
      });
      lsSet(LS_POSTS, S.posts);
      lsSet(LS_COMMENTS, S.comments);
      renderAll();
    } else if(!S.posts.length){
      useDemo();
    }
  }, 15000); // 手機給 15 秒
}

/* ── Push (UI → Google Sheets)，含靜默重試，手機寫入不顯示失敗 ── */
var _pushQueue = [];      // 待重試的寫入佇列
var _pushBusy  = false;   // 是否正在嘗試寫入

function push(payload, ok, fail){
  if(!GAS_URL.startsWith('https://script.google.com')){ ok&&ok(); return; }
  _pushQueue.push({payload:payload, ok:ok, fail:fail, tries:0});
  flushQueue();
}

function flushQueue(){
  if(_pushBusy || _pushQueue.length===0) return;
  _pushBusy = true;
  var item = _pushQueue[0];
  item.tries++;

  var qs = Object.keys(item.payload).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(item.payload[k]);
  }).join('&');

  // 手機版給更充裕的 30 秒，GAS 冷啟動加寫入約需 10～25 秒
  jsonp(GAS_URL+'?'+qs, function(err, res){
    _pushBusy = false;

    var failed = err || (res && res.success === false);

    if(!failed){
      // 成功：移出佇列，執行 ok callback，繼續下一筆
      _pushQueue.shift();
      item.ok && item.ok(res);
      setTimeout(flushQueue, 500);

    } else if(item.tries < 3){
      // 失敗但還有重試次數：等待後重試，不顯示錯誤
      console.warn('[push] 第'+item.tries+'次失敗，準備重試', err&&err.message);
      setTimeout(flushQueue, item.tries * 4000);   // 4s、8s 遞增間隔

    } else {
      // 三次都失敗：移出佇列，執行 fail callback（此時才告知使用者）
      _pushQueue.shift();
      item.fail && item.fail();
      setTimeout(flushQueue, 500);
    }
  }, 30000);
}

/* ── Demo data：已移除，改為等待 Google Sheets 資料 ── */
function useDemo(){
  // 清除本機暫存，確保不顯示舊資料
  S.posts = [];
  lsSet(LS_POSTS, []);
  renderAll();
}

/* ── Submit ── */
function onSubmit(e){
  e.preventDefault();
  const name  = (D.heroName.value||'').replace(/\s+/g,'').trim();
  const dept  = (D.dept.value||'').trim();
  const story = (D.story.value||'').trim();
  if(!name)  return toast('請填寫神隊友姓名');
  if(!dept)  return toast('請選擇部門');
  if(!story) return toast('請填寫超能力事蹟');
  if(!/^[A-Za-z0-9_\u4e00-\u9fff]{2,40}$/.test(name))
    return toast('姓名格式建議為英數字，例如 ArthurWang');

  const post={id:uid(),heroName:name,dept,story,createdAt:Date.now(),likes:0};
  S.posts.unshift(post);
  lsSet(LS_POSTS,S.posts);
  renderAll();
  closeMod();
  D.form.reset();
  // 先給使用者確認感，不急著說「正在同步」
  toast('感謝已送出 ✅');

  push(
    {action:'create', heroName:name, dept, story},
    function(){ pull(); },          // 成功後靜默拉取最新資料，不打擾使用者
    function(){ toast('網路不穩，感謝已暫存，稍後自動重試'); }
  );
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── Like ── */
function onLike(id){
  const p=S.posts.find(p=>p.id===id); if(!p) return;
  if(S.likesMap[id]){ p.likes=Math.max(0,(p.likes||0)-1); delete S.likesMap[id]; }
  else              { p.likes=(p.likes||0)+1; S.likesMap[id]=true; }
  lsSet(LS_POSTS,S.posts); lsSet(LS_LIKES,S.likesMap);
  push({action:'like',id,likes:p.likes});
  renderAll();
}

/* ── Comment ── */
function toggleCmt(id){
  S.openCmt[id]=!S.openCmt[id];
  const w=document.getElementById('cw_'+id);
  if(w) w.classList.toggle('open',!!S.openCmt[id]);
}
function sendCmt(id){
  const inp=document.getElementById('ci_'+id); if(!inp) return;
  const text=(inp.value||'').trim();
  if(!text) return toast('留言不可為空');
  if(!S.comments[id]) S.comments[id]=[];
  if(S.comments[id].length>=MAX_CMT)
    return toast('留言已達上限，來增加新的感謝吧！');
  S.comments[id].push({text,createdAt:Date.now()});
  lsSet(LS_COMMENTS,S.comments);
  inp.value='';
  push({action:'comment',id,comment:text});
  S.openCmt[id]=true;
  renderAll();
}

/* ════════════ RENDER ════════════ */
function renderAll(){
  renderStats(); renderMarquee(); renderChips(); renderLeaders(); renderWall(getFiltered());
}

function renderStats(){
  const now=Date.now(), ws=now-WEEK;
  D.statL.textContent = fmt(S.posts.reduce((s,p)=>s+(p.likes||0),0));
  D.statW.textContent = '+'+fmt(S.posts.filter(p=>p.createdAt>=ws).length);
  D.statC.textContent = fmt(S.posts.reduce((s,p)=>
    s+(S.comments[p.id]||[]).filter(c=>c.createdAt>=ws).length,0));
}

function renderMarquee(){
  const now=Date.now();
  const src=S.posts.filter(p=>now-p.createdAt<=HOUR72)
    .sort((a,b)=>b.createdAt-a.createdAt).slice(0,12);
  const list=src.length?src:[{heroName:'神隊友',story:'目前還沒有 72 小時內的新感謝，歡迎送出第一則！'}];
  const html=list.map(p=>{
    const prev=p.story.length>32?p.story.slice(0,32)+'…':p.story;
    return `<span class="mq-item"><span class="mq-heart" aria-hidden="true">❤</span>感謝 <strong>${esc(p.heroName)}</strong> 的超能力事蹟：${esc(prev)}<span class="mq-sep">·</span></span>`;
  }).join('');
  D.mq.innerHTML=html+html;
}

function renderChips(){
  D.chips.innerHTML=DEPTS.map(d=>
    `<button type="button" class="chip${S.dept===d?' active':''}" data-d="${esc(d)}">${esc(d)}</button>`
  ).join('');
  D.chips.querySelectorAll('.chip').forEach(b=>
    b.addEventListener('click',()=>{ S.dept=b.dataset.d||'全部'; renderAll(); })
  );
}

function renderLeaders(){
  const tw=Date.now()-14*24*3600*1000;
  const lm={},tm={};
  S.posts.filter(p=>p.createdAt>=tw).forEach(p=>{
    lm[p.heroName]=(lm[p.heroName]||0)+(p.likes||0);
    tm[p.heroName]=(tm[p.heroName]||0)+1;
  });
  const tl=topOf(lm), tt=topOf(tm);

  function mkCard(entry,lbl,cls,icon){
    if(!entry) return `<div class="panel leader-card"><div class="leader-lbl ${cls}"><span class="ldot"></span>${lbl}</div><p style="color:var(--muted);font-size:13px;margin-top:10px;">暫無資料</p></div>`;
    return `<div class="panel leader-card">
      <div class="leader-lbl ${cls}"><span class="ldot"></span>${lbl}</div>
      <div class="leader-main">
        <div class="avatar ${getAv(entry.name)}" aria-hidden="true">${initial(entry.name)}</div>
        <div class="leader-info"><h3>${esc(entry.name)}</h3><p>${esc(getDept(entry.name))}</p></div>
        <div class="leader-score">${icon} ${fmt(entry.val)}</div>
      </div></div>`;
  }

  D.leaders.innerHTML =
    mkCard(tl,'兩週按讚王','lbl-pink','❤') +
    mkCard(tt,'兩週感謝王','lbl-teal','✨') +
    `<div class="panel add-card add-leader-card" id="addBtn"
          role="button" tabindex="0" aria-label="點擊送出感謝">
       <div class="add-icon" aria-hidden="true">✨</div>
       <p>送出一則感謝</p><span>點擊填寫表單</span>
     </div>`;

  const btn=$('addBtn');
  if(btn){
    btn.addEventListener('click', openMod);
    btn.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') openMod(); });
  }
}

function renderWall(posts){
  if(!posts.length){
    const isLoading = !S._loaded;
    D.wall.innerHTML = isLoading
      ? '<div class="empty">⏳ 正在從 Google Sheets 載入資料…</div>'
      : '<div class="empty">目前沒有符合條件的感謝，試試切換部門或搜尋其他關鍵字。</div>';
    return;
  }
  D.wall.innerHTML=posts.map((p,i)=>{
    const liked  = !!S.likesMap[p.id];
    const cmts   = S.comments[p.id]||[];
    const isOpen = !!S.openCmt[p.id];
    const full   = cmts.length>=MAX_CMT;

    const cmtList = cmts.map(c=>
      `<div class="comment-item"><div>${esc(c.text)}</div><div class="c-time">${relTime(c.createdAt)}</div></div>`
    ).join('');

    const cmtForm = full
      ? `<div class="comment-limit">留言已達上限 ${MAX_CMT}/${MAX_CMT}，來增加新的感謝吧！</div>`
      : `<div class="comment-form">
           <textarea class="comment-input" id="ci_${p.id}"
             placeholder="輸入留言… (Enter 送出)" rows="1" maxlength="200"
             aria-label="輸入留言"></textarea>
           <button class="comment-send" data-cs="${p.id}" aria-label="送出留言">送出</button>
         </div>`;

    return `<article class="panel post-card">
      <div class="post-top">
        <div class="avatar ${AV[i%AV.length]}" aria-hidden="true">${initial(p.heroName)}</div>
        <div class="post-info">
          <div class="post-name-row">
            <div class="post-name">${esc(p.heroName)}</div>
            <div class="post-time">${relTime(p.createdAt)}</div>
          </div>
          <div class="post-dept">${esc(p.dept)}</div>
        </div>
      </div>
      <div class="post-body">${esc(p.story)}</div>
      <div class="post-foot">
        <button class="act-btn${liked?' liked':''}" data-lk="${p.id}"
          aria-label="${liked?'取消按讚':'按讚'}">
          ${liked?'❤':'♡'} ${fmt(p.likes||0)}
        </button>
        <button class="act-btn" data-ct="${p.id}" aria-expanded="${isOpen}">
          💬 ${cmts.length} 留言
        </button>
      </div>
      <div class="comments-wrap${isOpen?' open':''}" id="cw_${p.id}">
        <div class="comment-list">${cmtList}</div>
        ${cmtForm}
      </div>
    </article>`;
  }).join('');

  D.wall.querySelectorAll('[data-lk]').forEach(b=>b.addEventListener('click',()=>onLike(b.dataset.lk)));
  D.wall.querySelectorAll('[data-ct]').forEach(b=>b.addEventListener('click',()=>toggleCmt(b.dataset.ct)));
  D.wall.querySelectorAll('[data-cs]').forEach(b=>b.addEventListener('click',()=>sendCmt(b.dataset.cs)));
  D.wall.querySelectorAll('.comment-input').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendCmt(inp.id.replace('ci_','')); }
    });
  });
}

/* ════════════ HELPERS ════════════ */
function getFiltered(){
  return S.posts.filter(p=>{
    const dm=S.dept==='全部'||p.dept===S.dept;
    const km=!S.kw||(p.heroName+' '+p.dept+' '+p.story).toLowerCase().includes(S.kw);
    return dm&&km;
  }).sort((a,b)=>b.createdAt-a.createdAt);
}
function merge(inc){
  const lk={};
  S.posts.forEach(p=>{ lk[sig(p)]=p.likes||0; });
  S.posts=inc.map(p=>({...p,likes:Number(p.likes||lk[sig(p)]||0)}))
    .sort((a,b)=>b.createdAt-a.createdAt);
}
function normalizeRow(row,i){
  if(!row) return null;
  const heroName=str(row.heroName||row['神隊友（格式：ArthurWang）']||row['神隊友']||'');
  const dept    =str(row.dept||row['部門']||'');
  const story   =str(row.story||row['他的超能力事蹟（當時發生了什麼？他做了什麼讓你難忘呢？）']||row['他的超能力事蹟']||'');
  if(!heroName||!dept||!story) return null;
  let ca=Date.parse(row.createdAt||row.time||'');
  if(isNaN(ca)) ca=Date.now()-i*60000;
  return {id:str(row.id||uid()),heroName,dept,story,createdAt:ca,likes:Number(row.likes||0)};
}
function validPost(p){ return p&&typeof p.heroName==='string'&&typeof p.dept==='string'&&typeof p.story==='string'&&typeof p.createdAt==='number'; }
function sig(p){ return p.heroName+'||'+p.dept+'||'+p.story; }
function topOf(map){ const ks=Object.keys(map); if(!ks.length) return null; let t=ks[0]; ks.forEach(k=>{ if(map[k]>map[t]) t=k; }); return {name:t,val:map[t]}; }
function getDept(name){ const p=S.posts.find(p=>p.heroName===name); return p?p.dept:''; }
function getAv(name){ let h=0; for(let i=0;i<name.length;i++) h=(h+name.charCodeAt(i))%AV.length; return AV[h]; }
function initial(n){ return String(n||'').slice(0,1).toUpperCase()||'神'; }
function fmt(n){ return new Intl.NumberFormat('zh-TW').format(Number(n)||0); }
function uid(){ return 'u'+Math.random().toString(36).slice(2,8)+Date.now().toString(36); }
function str(v){ return String(v||'').trim(); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function relTime(ts){
  const d=Date.now()-ts;
  if(d<60000)    return '剛剛';
  if(d<3600000)  return Math.floor(d/60000)+'分鐘前';
  if(d<86400000) return Math.floor(d/3600000)+'小時前';
  if(d<604800000)return Math.floor(d/86400000)+'天前';
  const dt=new Date(ts);
  return dt.getFullYear()+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+String(dt.getDate()).padStart(2,'0');
}
function debounce(fn,ms){ let t; return function(){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,arguments),ms); }; }

let _tt=null;
function toast(msg){
  D.toast.textContent=msg;
  D.toast.classList.add('show');
  clearTimeout(_tt);
  _tt=setTimeout(()=>D.toast.classList.remove('show'),2600);
}

/* ── Logo Rain ── */
function makeRain(){
  D.rain.innerHTML='';
  const n=window.innerWidth<768?10:22;
  for(let i=0;i<n;i++){
    const s=document.createElement('span');
    s.className='logo-drop';
    const sz=rnd(65,180);
    s.style.cssText=`left:${rnd(0,100)}%;--sz:${sz}px;--dur:${rnd(14,28)}s;--del:${-rnd(0,26)}s;--op:${(Math.random()*.16+.12).toFixed(3)};--rot:${rnd(-14,12)}deg;--dx:${rnd(-80,100)}px;`;
    D.rain.appendChild(s);
  }
}
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

init();
})();
